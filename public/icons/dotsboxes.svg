<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <!-- 3x3 dot grid with some lines drawn -->
  <!-- Dots -->
  <circle cx="4" cy="4" r="1.5"/>
  <circle cx="12" cy="4" r="1.5"/>
  <circle cx="20" cy="4" r="1.5"/>
  <circle cx="4" cy="12" r="1.5"/>
  <circle cx="12" cy="12" r="1.5"/>
  <circle cx="20" cy="12" r="1.5"/>
  <circle cx="4" cy="20" r="1.5"/>
  <circle cx="12" cy="20" r="1.5"/>
  <circle cx="20" cy="20" r="1.5"/>
  <!-- Lines (forming one complete box) -->
  <line x1="5.5" y1="4" x2="10.5" y2="4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  <line x1="5.5" y1="12" x2="10.5" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  <line x1="4" y1="5.5" x2="4" y2="10.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  <line x1="12" y1="5.5" x2="12" y2="10.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  <!-- Filled box -->
  <rect x="5.5" y="5.5" width="5" height="5" rx="0.5" opacity="0.35"/>
  <!-- Partial lines -->
  <line x1="13.5" y1="4" x2="18.5" y2="4" stroke="currentColor" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="20" y1="5.5" x2="20" y2="10.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
</svg>
