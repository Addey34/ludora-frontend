  <rect x="17" y="4.5" width="2.5" height="4" rx="1.2"/>
  <!-- Bottom row: 6 pits -->
  <rect x="5"  y="15.5" width="2.5" height="4" rx="1.2"/>
  <rect x="8"  y="15.5" width="2.5" height="4" rx="1.2"/>
  <rect x="11" y="15.5" width="2.5" height="4" rx="1.2"/>
  <rect x="14" y="15.5" width="2.5" height="4" rx="1.2"/>
  <rect x="17" y="15.5" width="2.5" height="4" rx="1.2"/>
