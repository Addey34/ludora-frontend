<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <!-- Alien body -->
  <rect x="5" y="7" width="14" height="10" rx="2"/>
  <!-- Eyes -->
  <rect x="7.5" y="10" width="3" height="3" rx="0.5" fill="white" opacity="0.9"/>
  <rect x="13.5" y="10" width="3" height="3" rx="0.5" fill="white" opacity="0.9"/>
  <!-- Antennae -->
  <line x1="9" y1="7" x2="7" y2="3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="15" y1="7" x2="17" y2="3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Legs -->
  <line x1="8" y1="17" x2="6" y2="21" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="12" y1="17" x2="12" y2="21" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="17" x2="18" y2="21" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
</svg>
