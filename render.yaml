# Render configuration (Blueprint) — static site.
# Vite build (output in dist/), then routes so each game is served ONLY on its
# own clean URL: /typing (not /typing/typing.html).
#
# Two rule types (evaluated top to bottom, first match wins):
#   - rewrite: the URL stays /<game> in the browser, but Render serves the
#     /<game>/index.html file.
#   - redirect (301): a catch-all /* sends everything else (old .html URLs,
#     unknown paths) back to the home page /.
# IMPORTANT: Render NEVER applies a rule when a real file exists at that path
# (it serves it directly). So /* does not break assets (/assets, /css, /icons,
# /data) — they are served as-is.
#
# NB: this file is NOT applied automatically (the service was created by hand).
# The ENGLISH routes below are hand-mirrored in the dashboard (Settings >
# Redirects/Rewrites), same order.
#
# FRENCH: Render only serves a folder's index.html WITH a trailing slash, and
# clean URLs have none — so folder-index alone doesn't cover /fr/<key>; an
# explicit rewrite is required. The FR pages are built UN-NESTED at
# dist/fr/<key>/index.html (see vite.config.ts closeBundle), so the whole /fr tree
# (games AND static pages) is covered in the dashboard by just TWO rules, placed
# before the /* catch-all:
#     Rewrite  /fr     -> /fr/index.html
#     Rewrite  /fr/*   -> /fr/*/index.html      (Render's wildcard: * = the match)
# The explicit /fr/<key> entries below are kept only as documentation + to satisfy
# the routesLocale parity test; the dashboard uses the 2-rule wildcard instead.
services:
  - type: web
    name: games-zone
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      # Clean URLs -> real file (the URL does not change in the address bar).
      # Games are built to dist/games/<key>/index.html; sidebar links use /<key>.
      # KEEP IN SYNC with the `games` array in vite.config.ts (one line per key,
      # same order). A missing line here makes that game fall through to the /*
      # redirect (home) in production.
      - { type: rewrite, source: /typing, destination: /games/typing/index.html }
      - { type: rewrite, source: /snake, destination: /games/snake/index.html }
      - { type: rewrite, source: /pacman, destination: /games/pacman/index.html }
      - { type: rewrite, source: /2048, destination: /games/2048/index.html }
      - { type: rewrite, source: /simon, destination: /games/simon/index.html }
