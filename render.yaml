# Render configuration (Blueprint) — static site.
# Vite build (output in dist/), then routes so each game is served ONLY on its
# own clean URL: /typing (not /typing/typing.html).
#
# Two rule types (evaluated top to bottom, first match wins):
#   - rewrite: the URL stays /<game> in the browser, but Render serves the
#     /<game>/index.html file.
#   - redirect (301): a catch-all /* sends everything else (old .html URLs,
#     unknown paths) back to the home page /.
# IMPORTANT: Render NEVER applies a rule when a real file exists at that path
# (it serves it directly). So /* does not break assets (/assets, /css, /icons,
# /data) — they are served as-is.
#
# NB: this file is NOT applied automatically (the service was created by hand).
# Mirror these same routes in the dashboard (Settings > Redirects/Rewrites),
# in the same order.
services:
  - type: web
    name: games-zone
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      # Clean URLs -> real file (the URL does not change in the address bar).
      # Games are built to dist/games/<key>/index.html; sidebar links use /<key>.
      # KEEP IN SYNC with the `games` array in vite.config.ts (one line per key,
      # same order). A missing line here makes that game fall through to the /*
      # redirect (home) in production.
      - { type: rewrite, source: /typing, destination: /games/typing/index.html }
      - { type: rewrite, source: /snake, destination: /games/snake/index.html }
      - { type: rewrite, source: /pacman, destination: /games/pacman/index.html }
      - { type: rewrite, source: /2048, destination: /games/2048/index.html }
      - { type: rewrite, source: /simon, destination: /games/simon/index.html }
      - { type: rewrite, source: /motus, destination: /games/motus/index.html }
      - { type: rewrite, source: /tetris, destination: /games/tetris/index.html }
      - { type: rewrite, source: /memory, destination: /games/memory/index.html }
      - { type: rewrite, source: /minesweeper, destination: /games/minesweeper/index.html }
      - { type: rewrite, source: /breakout, destination: /games/breakout/index.html }
      - { type: rewrite, source: /pong, destination: /games/pong/index.html }
      - { type: rewrite, source: /ludo, destination: /games/ludo/index.html }
      - { type: rewrite, source: /connect4, destination: /games/connect4/index.html }
      - { type: rewrite, source: /checkers, destination: /games/checkers/index.html }
      - { type: rewrite, source: /reversi, destination: /games/reversi/index.html }
      - { type: rewrite, source: /battleship, destination: /games/battleship/index.html }
      - { type: rewrite, source: /goose, destination: /games/goose/index.html }
      - { type: rewrite, source: /math, destination: /games/math/index.html }
      - { type: rewrite, source: /geoquiz, destination: /games/geoquiz/index.html }
      - { type: rewrite, source: /trivia, destination: /games/trivia/index.html }
      - { type: rewrite, source: /conjugation, destination: /games/conjugation/index.html }
      - { type: rewrite, source: /anagram, destination: /games/anagram/index.html }
      - { type: rewrite, source: /hangman, destination: /games/hangman/index.html }
      - { type: rewrite, source: /mastermind, destination: /games/mastermind/index.html }
      - { type: rewrite, source: /sokoban, destination: /games/sokoban/index.html }
      - { type: rewrite, source: /nonogram, destination: /games/nonogram/index.html }
      - { type: rewrite, source: /wordsearch, destination: /games/wordsearch/index.html }
      - { type: rewrite, source: /sudoku, destination: /games/sudoku/index.html }
      - { type: rewrite, source: /taquin, destination: /games/taquin/index.html }
      - { type: rewrite, source: /flappy, destination: /games/flappy/index.html }
      - { type: rewrite, source: /mancala, destination: /games/mancala/index.html }
      - { type: rewrite, source: /solitaire, destination: /games/solitaire/index.html }
      - { type: rewrite, source: /blackjack, destination: /games/blackjack/index.html }
      - { type: rewrite, source: /invaders, destination: /games/invaders/index.html }
      - { type: rewrite, source: /bubbles, destination: /games/bubbles/index.html }
      - { type: rewrite, source: /dotsboxes, destination: /games/dotsboxes/index.html }
      - { type: rewrite, source: /yahtzee, destination: /games/yahtzee/index.html }
      - { type: rewrite, source: /binairo, destination: /games/binairo/index.html }
      - { type: rewrite, source: /kakuro, destination: /games/kakuro/index.html }
      - { type: rewrite, source: /privacy, destination: /privacy/index.html }
      - { type: rewrite, source: /legal, destination: /legal/index.html }
      - { type: rewrite, source: /profile, destination: /profile/index.html }
      # Everything else (old .html URLs, unknown paths) -> home.
      # LAST: the rules above take priority, and so do assets.
      - { type: redirect, source: /*, destination: / }
