name: CI

# Runs the exact `npm run verify` gate (format, lint, knip, types+build, tests)
# on every push and pull request to main, so local and CI can never diverge.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify (format, lint, knip, build, tests)
        run: npm run verify
