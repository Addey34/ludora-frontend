name: CI

# Runs the exact `npm run verify` gate (format, lint, knip, types+build, tests)
# on every push and pull request to main, so local and CI can never diverge.
# On push to main only, also deploys to Firebase Hosting (requires FIREBASE_TOKEN secret).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify (format, lint, knip, build, tests)
        run: npm run verify

      - name: Deploy to Firebase Hosting
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: npx firebase-tools deploy --only hosting --token ${{ secrets.FIREBASE_TOKEN }}
