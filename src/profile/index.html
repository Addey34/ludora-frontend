<!doctype html>
<html lang="en">
  {{> head title="Profile — Games Zone" css="/css/profile.css" script="./profile-main.ts"}}
  <body class="app-body">
    {{> game-chrome}}
    <main class="profile-content">
      <div class="profile-header">
        <div>
          <h1 class="profile-title" data-i18n="profileTitle">Profile</h1>
          <p class="profile-subtitle" data-i18n="profileAccountSubtitle">
            Your account and display name.
          </p>
        </div>
        <a class="btn btn--secondary profile-back" href="/">
          <i class="fas fa-arrow-left" aria-hidden="true"></i>
          <span data-i18n="home">Home</span>
        </a>
      </div>

      <div class="profile-name" id="profileNameRow" hidden>
        <span class="profile-name-label" data-i18n="displayNameLabel">Display name</span>
        <div class="profile-name-display" id="nameDisplay">
          <span class="profile-name-value" id="nameValue"></span>
          <button
            class="profile-name-edit"
            type="button"
            id="editName"
            data-i18n-aria="editName"
            aria-label="Edit name"
          >
            <i class="fas fa-pencil" aria-hidden="true"></i>
          </button>
        </div>
        <form class="profile-name-form" id="displayNameForm" hidden>
          <input
            id="displayName"
            class="input-field"
            maxlength="20"
            autocomplete="off"
            data-i18n-aria="displayNameLabel"
          />
          <button type="submit" class="btn btn--primary" data-i18n="saveName">Save</button>
          <button type="button" class="btn btn--secondary" id="cancelName" data-i18n="cancel">
            Cancel
          </button>
        </form>
      </div>

      <p class="profile-empty profile-empty--account" id="profileGuest" data-i18n="profileGuest">
        Sign in with Google to set your name and appear on the leaderboard.
      </p>
    </main>
  </body>
</html>
