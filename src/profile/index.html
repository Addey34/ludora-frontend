<!doctype html>
<html lang="en">
  {{> head title="Profile — Games Zone" css="/css/profile.css" script="./profile-main.ts"}}
  <body class="app-body">
    {{> game-chrome}}
    <main class="profile-content">
      <div class="profile-header">
        <div>
          <h1 class="profile-title" data-i18n="profileTitle">Profile</h1>
          <p class="profile-subtitle" data-i18n="profileAccountSubtitle">
            Your account and display name.
          </p>
        </div>
        <a class="btn btn--secondary profile-back" href="/">
          <i class="fas fa-arrow-left" aria-hidden="true"></i>
          <span data-i18n="home">Home</span>
        </a>
      </div>

      <div class="profile-name" id="profileNameRow" hidden>
        <label class="profile-name-label" for="displayName" data-i18n="displayNameLabel"
          >Display name</label
        >
        <form class="profile-name-form" id="displayNameForm">
          <input id="displayName" class="input-field" maxlength="20" autocomplete="off" />
          <button type="submit" class="btn btn--primary" data-i18n="saveName">Save</button>
        </form>
      </div>

      <p class="profile-empty" id="profileGuest" data-i18n="profileGuest" hidden>
        Sign in with Google to set your name and appear on the leaderboard.
      </p>
    </main>
  </body>
</html>
