<!doctype html>
<html lang="en">
  {{> head title="My Scores — Games Zone" css="/css/profile.css" script="./profile-main.ts"}}
  <body class="app-body">
    {{> game-chrome}}
    <main class="profile-content">
      <div class="profile-header">
        <div>
          <h1 class="profile-title" data-i18n="profileTitle">My Scores</h1>
          <p class="profile-subtitle" id="profileSummary" data-i18n="profileSubtitle">
            Your best score in every game, on this device.
          </p>
        </div>
        <a class="btn btn--secondary profile-back" href="/">
          <i class="fas fa-arrow-left" aria-hidden="true"></i>
          <span data-i18n="home">Home</span>
        </a>
      </div>

      <div class="profile-name" id="profileNameRow" hidden>
        <label class="profile-name-label" for="displayName" data-i18n="displayNameLabel"
          >Display name</label
        >
        <form class="profile-name-form" id="displayNameForm">
          <input id="displayName" class="input-field" maxlength="20" autocomplete="off" />
          <button type="submit" class="btn btn--primary" data-i18n="saveName">Save</button>
        </form>
      </div>

      <div class="profile-grid" id="profileGrid"></div>
    </main>
  </body>
</html>
