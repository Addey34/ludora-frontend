<!doctype html>
<html lang="en">
  {{> head title="Games Zone" css="/css/home.css"}}
  <body class="app-body home-body">
    {{> sidebar}}
    <div class="home-main">
      <header class="home-hero">
        <h1 class="home-title">Games Zone</h1>
        <p class="home-tagline" data-i18n="tagline">Browser games — play instantly, no download</p>
      </header>
      {{#each categories}}
      <section class="game-category">
        <h2 class="game-category-title" data-i18n="cat_{{id}}">{{label}}</h2>
        <nav class="game-grid" aria-label="{{label}}">
          {{#each games}}
          <a
            href="/{{key}}"
            class="game-tile"
            data-game="{{key}}"
            aria-label="{{label}}"
            data-i18n-aria="game_{{key}}"
            data-label="{{label}}"
            data-i18n-label="game_{{key}}"
            style="--nav-accent: var({{color}})"
          >
            <span
              class="game-icon"
              style="--game-icon: url(/icons/{{key}}.svg)"
              aria-hidden="true"
            ></span>
          </a>
          {{/each}}
        </nav>
      </section>
      {{/each}}
    </div>
    <footer class="home-footer">
      <a href="/privacy">Privacy Policy</a>
      <span aria-hidden="true">·</span>
      <a href="/legal">Legal Notice</a>
    </footer>
  </body>
</html>
