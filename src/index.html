<!doctype html>
<html lang="en">
  {{> head title="Games Zone" css="/css/home.css"}}
  <body class="app-body home-body">
    {{> sidebar}}
    <div class="home-main">
      <nav class="game-grid game-grid-all" aria-label="All games" data-i18n-aria="allGames">
        {{#each games}}
        <a
          href="/{{key}}"
          class="game-tile"
          data-game="{{key}}"
          aria-label="{{label}}"
          data-i18n-aria="game_{{key}}"
          data-label="{{label}}"
          data-i18n-label="game_{{key}}"
          style="--nav-accent: var({{color}})"
        >
          <span
            class="game-icon"
            style="--game-icon: url(/icons/{{key}}.svg)"
            aria-hidden="true"
          ></span>
        </a>
        {{/each}}
      </nav>
    </div>
    <footer class="home-footer">
      <a href="/privacy">Privacy Policy</a>
      <span aria-hidden="true">·</span>
      <a href="/legal">Legal Notice</a>
    </footer>
  </body>
</html>
