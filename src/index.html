<!doctype html>
<html lang="en">
  {{> head title="Games Zone" css="/css/home.css"}}
  <body class="app-body home-body">
    {{> sidebar}}
    <div class="home-main">
      <header class="home-hero">
        <h1 class="home-title">Games Zone</h1>
        <p class="home-tagline">Browser games — play instantly, no download</p>
      </header>
      <nav class="game-grid" aria-label="Games">
        {{#each games}}
        <a
          href="/{{key}}"
          class="game-tile"
          data-game="{{key}}"
          aria-label="{{label}}"
          data-label="{{label}}"
          style="--nav-accent: var({{color}})"
        >
          <span
            class="game-icon"
            style="--game-icon: url(/icons/{{key}}.svg)"
            aria-hidden="true"
          ></span>
        </a>
        {{/each}}
      </nav>
    </div>
    <footer class="home-footer">
      <a href="/privacy">Privacy Policy</a>
      <span aria-hidden="true">·</span>
      <a href="/legal">Legal Notice</a>
    </footer>
  </body>
</html>
