<!doctype html>
<html lang="en">
  {{> head title="Hangman" css="/css/games/pendu.css" script="./pendu-main.ts"}}
  <body class="app-body">
    {{> shell-open title="Hangman" key="pendu"}}
    <div class="game-details"></div>
    <div class="pendu-area game-board" id="board">
      <div class="pendu-figure" id="figure"></div>
      <div class="pendu-word" id="word"></div>
      <div class="pendu-keyboard" id="keyboard"></div>
    </div>
    {{> shell-close}} {{> game-chrome}}
  </body>
</html>
