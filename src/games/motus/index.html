<!doctype html>
<html lang="en">
  {{> head title="Motus" css="/css/games/motus.css" script="./motus-main.ts"}}
  <body class="app-body">
    {{> shell-open title="Motus" key="motus"}}
    <div class="game-details"></div>
    <div class="motus-area game-stack">
      <div class="game-stack-main">
        <div class="motus-grid" id="grid"></div>
      </div>
      <div class="motus-keyboard" id="keyboard"></div>
    </div>
    {{> shell-close}} {{> game-chrome}}
  </body>
</html>
